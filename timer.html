<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM-Timer</title>
    <link rel="icon" type="image/png" href="icon.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Custom styles for dark theme */
        body {
            background-color: #111111;
            color: #d1d5db;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        
        .card {
            background-color: #1f1f1f;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
        }
        
        .timer-display {
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.05em;
        }
        
        .btn-control {
            background-color: #2a2a2a;
            color: #f3f4f6;
            transition: all 0.15s ease;
            border: 1px solid #3a3a3a;
        }
        
        .btn-control:hover:not(:disabled) {
            transform: scale(1.05);
            filter: brightness(1.15);
        }
        
        .btn-control:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .btn-control:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .btn-start {
            background-color: #374151;
        }
        
        .btn-pause {
            background-color: #4b5563;
        }
        
        .btn-reset {
            background-color: #1f2937;
            color: #9ca3af;
        }
        
        .btn-add {
            background-color: #262626;
            color: #d1d5db;
            font-size: 0.75rem;
            padding: 0.5rem 0.75rem;
        }
        
        .btn-add:hover {
            background-color: #333333;
        }
        
        .mode-btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            transition: all 0.15s;
            background-color: #262626;
            color: #6b7280;
            border: 1px solid #3a3a3a;
        }
        
        .mode-btn.active {
            background-color: #3a3a3a;
            color: #f3f4f6;
            border-color: #4b5563;
        }
        
        .mode-btn:hover:not(.active) {
            color: #9ca3af;
            border-color: #4b5563;
        }
        
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-running {
            background-color: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
            animation: pulse 2s infinite;
        }
        
        .status-paused {
            background-color: #eab308;
        }
        
        .status-stopped {
            background-color: #6b7280;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        /* Mobile responsive */
        @media (max-width: 640px) {
            .timer-font {
                font-size: 4rem !important;
            }
            
            .controls-grid {
                grid-template-columns: repeat(3, 1fr) !important;
            }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen p-4">
    <!-- Header -->
    <header class="flex justify-center items-center mb-6">
        <div class="flex items-center gap-3">
            <div id="statusIndicator" class="status-indicator status-stopped"></div>
            <span id="statusText" class="text-sm text-gray-500">Остановлен</span>
        </div>
    </header>
    
    <!-- Main Timer Card -->
    <main class="flex-1 flex flex-col items-center justify-center">
        <div class="card w-full max-w-2xl p-8">
            <!-- Mode Selector -->
            <div class="flex justify-center items-center mb-8">
                <div class="flex items-center gap-2">
                    <span class="text-gray-400 text-sm">Режим:</span>
                    <div class="flex gap-1">
                        <button id="modeCountdown" class="mode-btn active">Таймер</button>
                        <button id="modeStopwatch" class="mode-btn">Секундомер</button>
                    </div>
                </div>
            </div>
            
            <!-- Timer Display -->
            <div class="text-center mb-8">
                <div id="timerDisplay" class="timer-display timer-font text-7xl font-bold text-white mb-4">
                    05:00
                </div>
                <div id="timerSubtext" class="text-gray-500 text-sm">
                    Таймер
                </div>
            </div>
            
            <!-- Main Controls -->
            <div class="flex justify-center gap-4 mb-8">
                <button id="btnStart" class="btn-control btn-start px-8 py-4 rounded-xl font-semibold text-lg min-w-[120px]">
                    Старт
                </button>
                <button id="btnPause" class="btn-control btn-pause px-8 py-4 rounded-xl font-semibold text-lg min-w-[120px]" disabled>
                    Пауза
                </button>
                <button id="btnReset" class="btn-control btn-reset px-8 py-4 rounded-xl font-semibold text-lg min-w-[120px]">
                    Сброс
                </button>
            </div>
            
            <!-- Add Time Buttons (for countdown) -->
            <div id="addTimeControls" class="flex justify-center gap-2 mb-4">
                <button id="add30s" class="btn-add rounded-lg">+30s</button>
                <button id="add1m" class="btn-add rounded-lg">+1m</button>
                <button id="add5m" class="btn-add rounded-lg">+5m</button>
            </div>
            
            <!-- Duration Input (for countdown) -->
            <div id="durationControls" class="flex justify-center items-center gap-3 mb-4">
                <span class="text-gray-500 text-sm">Длительность:</span>
                <input 
                    type="number" 
                    id="durationInput" 
                    class="bg-[#262626] border border-[#3a3a3a] rounded-lg px-3 py-2 text-white text-center w-20"
                    value="5"
                    min="1"
                    max="180"
                >
                <span class="text-gray-500 text-sm">мин</span>
            </div>
        </div>
        
        <!-- Info -->
        <p class="text-center text-gray-600 text-sm mt-6">
            Таймер синхронизируется между всеми устройствами
        </p>
    </main>
    
    <!-- Error Display -->
    <div id="errorToast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-red-900 text-red-200 px-4 py-2 rounded-lg hidden">
        Ошибка подключения
    </div>
    
    <!-- Load scripts -->
    <script src="supabase.js"></script>
    <script src="main.js"></script>
</body>
</html>
